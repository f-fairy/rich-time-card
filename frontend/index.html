<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rich Time Card - Attendance</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 720px);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        box-shadow: 0 18px 45px rgb(15 23 42 / 0.08);
        padding: 28px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(1.75rem, 3vw, 2.35rem);
      }

      .subtitle {
        margin: 0 0 24px;
        color: #475569;
      }

      .status-card {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-bottom: 24px;
      }

      .field {
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 16px;
        background: #f8fafc;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: #64748b;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .value {
        font-size: 1.25rem;
        font-weight: 800;
      }

      .actions {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        margin-bottom: 24px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 14px 16px;
        color: #94a3b8;
        background: #e2e8f0;
        font: inherit;
        font-weight: 800;
        box-shadow: none;
      }

      button:not(:disabled) {
        cursor: pointer;
        color: #ffffff;
        background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
        box-shadow:
          0 7px 0 #1e40af,
          0 14px 24px rgb(37 99 235 / 0.28);
        transform: translateY(-2px);
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.15s ease;
      }

      button:not(:disabled):hover {
        background: linear-gradient(180deg, #60a5fa 0%, #1d4ed8 100%);
        box-shadow:
          0 8px 0 #1e3a8a,
          0 16px 28px rgb(37 99 235 / 0.34);
        transform: translateY(-3px);
      }

      button:not(:disabled):active {
        box-shadow:
          0 2px 0 #1e3a8a,
          0 8px 16px rgb(37 99 235 / 0.24);
        transform: translateY(3px);
      }

      button:disabled {
        cursor: not-allowed;
      }

      pre {
        overflow: auto;
        min-height: 140px;
        margin: 0;
        border-radius: 14px;
        padding: 16px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.9rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rich Time Card</h1>
      <p class="subtitle">Simple attendance screen for <strong>test-user</strong>.</p>

      <section class="status-card" aria-label="Current attendance">
        <div class="field">
          <span class="label">Attendance Status</span>
          <span class="value" id="status">Loading...</span>
        </div>
        <div class="field">
          <span class="label">Work Date</span>
          <span class="value" id="work-date">Loading...</span>
        </div>
      </section>

      <section class="actions" aria-label="Attendance actions">
        <button type="button" data-action="checkin" data-endpoint="/api/attendance/checkin">Clock In</button>
        <button type="button" data-action="checkout" data-endpoint="/api/attendance/checkout">Clock Out</button>
        <button type="button" data-action="break-start" data-endpoint="/api/attendance/break-start">Break Start</button>
        <button type="button" data-action="break-end" data-endpoint="/api/attendance/break-end">Break End</button>
      </section>

      <section aria-label="Latest API response">
        <span class="label">Latest JSON Response</span>
        <pre id="response">Waiting for API response...</pre>
      </section>
    </main>

    <script>
      const USER_ID = "test-user";
      const statusElement = document.querySelector("#status");
      const workDateElement = document.querySelector("#work-date");
      const responseElement = document.querySelector("#response");
      const actionButtons = document.querySelectorAll("button[data-endpoint]");
      const enabledActionsByStatus = {
        BEFORE_WORK: ["checkin"],
        WORKING: ["checkout", "break-start"],
        AWAY: ["break-end", "checkout"],
        FINISHED: [],
      };
      let currentStatus = "BEFORE_WORK";
      let isLoading = true;

      function showJson(data) {
        responseElement.textContent = JSON.stringify(data, null, 2);
      }

      function updateButtonState() {
        const enabledActions = enabledActionsByStatus[currentStatus] || [];

        actionButtons.forEach((button) => {
          button.disabled = isLoading || !enabledActions.includes(button.dataset.action);
        });
      }

      function updateAttendance(data) {
        if (data.status) {
          currentStatus = data.status;
          statusElement.textContent = data.status;
        }

        if (data.work_date) {
          workDateElement.textContent = data.work_date;
        }

        updateButtonState();
      }

      function setLoading(nextIsLoading) {
        isLoading = nextIsLoading;
        updateButtonState();
      }

      async function requestJson(path, options = {}) {
        const response = await fetch(path, options);
        const data = await response.json();

        if (!response.ok) {
          throw data;
        }

        return data;
      }

      async function loadStatus() {
        try {
          const data = await requestJson(
            `/api/attendance/status?user_id=${encodeURIComponent(USER_ID)}`,
          );
          updateAttendance(data);
          setLoading(false);
          showJson(data);
        } catch (error) {
          showJson({ error });
          statusElement.textContent = "Error";
          workDateElement.textContent = "Error";
          setLoading(true);
        }
      }

      async function runAction(endpoint) {
        setLoading(true);

        try {
          const data = await requestJson(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ user_id: USER_ID }),
          });
          updateAttendance(data);
          showJson(data);
        } catch (error) {
          showJson({ error });
        } finally {
          setLoading(false);
        }
      }

      actionButtons.forEach((button) => {
        button.addEventListener("click", () => runAction(button.dataset.endpoint));
      });

      updateButtonState();
      loadStatus();
    </script>
  </body>
</html>
